<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nut Project</title>

<style>
body{margin:0;font-family:Arial;background:#FAF3E8}

/* NAV */
nav{
  height:60px;
  background:#3B1F0A;
  color:white;
  display:flex;
  align-items:center;
  padding:0 20px;
}
nav a{color:white;text-decoration:none;margin-left:auto}

/* SLIDER */
.hero{height:90vh;overflow:hidden;position:relative;}
.slides{display:flex;height:100%;transition:0.8s;}
.slide{min-width:100%;position:relative;}
.slide img{width:100%;height:100%;object-fit:cover;}

.overlay{
  position:absolute;
  bottom:50px;
  left:50px;
  color:white;
}

.buy-btn{
  margin-top:10px;
  display:inline-block;
  padding:12px 20px;
  background:#F5A623;
  color:#3B1F0A;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
}

/* ARROWS */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:40px;height:40px;
  background:rgba(0,0,0,0.5);
  color:white;
  border:none;
  cursor:pointer;
}
#prev{left:10px;}
#next{right:10px;}
</style>
</head>

<body>

<nav>
  Nut Project
  <a href="cart.html">🛒 Cart</a>
</nav>

<div class="hero">
  <div class="slides" id="slides">

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1615485500704-8e990f9900b3">
      <div class="overlay">
        <h1>Peanut Butter</h1>
        <a href="#" onclick="addToCart('Peanut Butter')" class="buy-btn">Add to Cart 🛒</a>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64">
      <div class="overlay">
        <h1>Nut Spreads</h1>
        <a href="#" onclick="addToCart('Nut Spreads')" class="buy-btn">Add to Cart 🛒</a>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c">
      <div class="overlay">
        <h1>Chocolate Nuts</h1>
        <a href="#" onclick="addToCart('Chocolate Nuts')" class="buy-btn">Add to Cart 🛒</a>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32">
      <div class="overlay">
        <h1>Hazelnut Cream</h1>
        <a href="#" onclick="addToCart('Hazelnut Cream')" class="buy-btn">Add to Cart 🛒</a>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1585238342028-4c2e9a36c6a6">
      <div class="overlay">
        <h1>Chocolate Covered Nuts</h1>
        <a href="#" onclick="addToCart('Chocolate Covered Nuts')" class="buy-btn">Add to Cart 🛒</a>
      </div>
    </div>

  </div>

  <button class="arrow" id="prev">←</button>
  <button class="arrow" id="next">→</button>
</div>

<script>
let i=0;
const slides=document.getElementById("slides");
const total=document.querySelectorAll(".slide").length;

function go(n){
  i=(n+total)%total;
  slides.style.transform=`translateX(-${i*100}%)`;
}

document.getElementById("next").onclick=()=>go(i+1);
document.getElementById("prev").onclick=()=>go(i-1);

setInterval(()=>go(i+1),4000);

// CART FUNCTION
function addToCart(product){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(product + " added to cart 🛒");
}
</script>

</body>
</html>
