<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nut Project</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:    #F5A623;
      --amber-dk: #C87A0A;
      --brown:    #3B1F0A;
      --cream:    #FAF3E8;
      --warm-gray:#E8DDD0;
      --text:     #2C1A08;
      --muted:    #7A5C3A;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--brown);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 58px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
    }

    .nav-logo .nut-icon {
      width: 30px;
      height: 30px;
    }

    .nav-logo span {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #e8d8c0;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    .nav-links a:hover { color: var(--amber); }

    .hero {
      margin-top: 58px;
      position: relative;
      width: 100%;
      height: calc(100vh - 58px);
      overflow: hidden;
    }

    .slides {
      display: flex;
      height: 100%;
      transition: transform 0.85s cubic-bezier(0.77, 0, 0.175, 1);
    }

    .slide {
      min-width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.06);
      transition: transform 7s ease;
    }

    .slide.active img { transform: scale(1); }

    .slide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(30,10,0,0.55) 0%,
        rgba(30,10,0,0.15) 60%,
        transparent 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3.5rem 4rem;
    }

    .slide-label {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      color: #fff;
      opacity: 0;
      transform: translateY(22px);
      transition: 0.7s ease;
    }

    .slide-sub {
      margin-top: 0.6rem;
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.82);
      opacity: 0;
      transform: translateY(16px);
      transition: 0.7s ease;
    }

    .slide.active .slide-label,
    .slide.active .slide-sub {
      opacity: 1;
      transform: translateY(0);
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.35);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    .slider-btn.prev { left: 1.5rem; }
    .slider-btn.next { right: 1.5rem; }

    .slider-dots {
      position: absolute;
      bottom: 2rem;
      right: 4rem;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      cursor: pointer;
      border: none;
    }

    .dot.active {
      background: var(--amber);
      transform: scale(1.4);
    }

  </style>
</head>

<body>

<nav>
  <a href="#" class="nav-logo">
    <svg class="nut-icon" viewBox="0 0 40 40">
      <ellipse cx="20" cy="22" rx="13" ry="12" fill="#C87A0A"/>
      <ellipse cx="20" cy="22" rx="10" ry="9" fill="#F5A623"/>
    </svg>
    <span>Nut Project</span>
  </a>
</nav>

<section class="hero">
  <div class="slides" id="slides">

    <div class="slide active">
      <img src="https://images.unsplash.com/photo-1574201635302-388dd92a4c3f?w=1600&q=80">
      <div class="slide-overlay">
        <div class="slide-label">Smooth Almond Butter</div>
        <div class="slide-sub">Small-batch perfection</div>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1600&q=80">
      <div class="slide-overlay">
        <div class="slide-label">Nut Spreads</div>
        <div class="slide-sub">Made with love</div>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=1600&q=80">
      <div class="slide-overlay">
        <div class="slide-label">Artisan Treats</div>
        <div class="slide-sub">Chocolate & nuts</div>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32?w=1600&q=80">
      <div class="slide-overlay">
        <div class="slide-label">Hazelnut Dream</div>
        <div class="slide-sub">Rich & creamy</div>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1548940740-204726a19be3?w=1600&q=80">
      <div class="slide-overlay">
        <div class="slide-label">Morning Blends</div>
        <div class="slide-sub">Start your day right</div>
      </div>
    </div>

  </div>

  <button class="slider-btn prev" id="prevBtn">←</button>
  <button class="slider-btn next" id="nextBtn">→</button>
  <div class="slider-dots" id="dots"></div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const slidesEl = document.getElementById("slides");
  const slides = document.querySelectorAll(".slide");
  const dotsWrap = document.getElementById("dots");

  let current = 0;
  let timer;

  // create dots for ALL slides (fixed issue)
  slides.forEach((_, i) => {
    const dot = document.createElement("button");
    dot.classList.add("dot");
    if (i === 0) dot.classList.add("active");
    dot.addEventListener("click", () => goTo(i));
    dotsWrap.appendChild(dot);
  });

  function goTo(i) {
    current = (i + slides.length) % slides.length;

    slidesEl.style.transform = `translateX(-${current * 100}%)`;

    slides.forEach((s, idx) => {
      s.classList.toggle("active", idx === current);
    });

    document.querySelectorAll(".dot").forEach((d, idx) => {
      d.classList.toggle("active", idx === current);
    });

    reset();
  }

  function reset() {
    clearInterval(timer);
    timer = setInterval(() => goTo(current + 1), 5000);
  }

  document.getElementById("nextBtn").addEventListener("click", () => goTo(current + 1));
  document.getElementById("prevBtn").addEventListener("click", () => goTo(current - 1));

  reset();
});
</script>

</body>
</html>
